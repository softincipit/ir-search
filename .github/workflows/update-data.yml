name: Update K-Startup data

on:
  schedule:
    # 3시간마다 (UTC 0,3,6,9,12,15,18,21시 = KST 매 3시간)
    - cron: "0 */3 * * *"
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "curl_cffi>=0.15"

      - name: Crawl announcements
        run: python scripts/kstartup_crawl.py list -o new.jsonl

      - name: Publish only if crawl succeeded
        run: |
          COUNT=$(wc -l < new.jsonl)
          echo "crawled $COUNT items"
          if [ "$COUNT" -lt 10 ]; then
            echo "::warning::수집 건수가 너무 적어 기존 데이터를 유지합니다."
            exit 0
          fi
          mv new.jsonl docs/all.jsonl

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/all.jsonl
          git diff --staged --quiet || git commit -m "chore: refresh K-Startup data ($(date -u +%Y-%m-%d))"
          git push
